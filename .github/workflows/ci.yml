name: CI

on:
  push:
branches: [ main, master ]
  pull_request:
branches: [ main, master ]

jobs:
  api-check:
name: API install and build
runs-on: ubuntu-latest

defaults:
run:
working-directory: apps/api

steps:
- name: Checkout
uses: actions/checkout@v4

- name: Setup Node
uses: actions/setup-node@v4
with:
node-version: 22

- name: Install dependencies
run: npm install

- name: Build API
run: npm run build --if-present
